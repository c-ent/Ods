server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # ---------------- Security Headers ----------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions-Policy is simplified to common safe defaults
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---------------- Gzip Compression ----------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ---------------- Cache Static Assets ----------------
    # Hashed assets (Vite/CRA) can be cached aggressively
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|ico|svg|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------------- No Cache for SPA Entry Point ----------------
    # Ensure browsers always fetch latest index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---------------- SPA Routing ----------------
    # Redirect all unknown paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------- Optional Logging ----------------
    # Access logs for HTML only; static assets logging off
    access_log /var/log/nginx/access.log main;
}

