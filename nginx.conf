server {
    listen 8080;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ---------------- Security Headers ----------------
    # IMPORTANT: Nginx does NOT inherit server-level add_header in location blocks
    # that define their own add_header. Headers are repeated in each such block below.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Replace https://*.supabase.co with your specific project URL if preferred
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.supabase.co; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    # ---------------- Gzip Compression ----------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ---------------- Cache Static Assets ----------------
    # Hashed assets (Vite) can be cached aggressively
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|ico|svg|ttf|eot)$ {
        expires 1y;
        # Security headers repeated (nginx add_header inheritance fix)
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.supabase.co; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;
        access_log off;
    }

    # ---------------- No Cache for SPA Entry Point ----------------
    # Ensure browsers always fetch latest index.html
    location = /index.html {
        # Security headers repeated (nginx add_header inheritance fix)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.supabase.co; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;
    }

    # ---------------- SPA Routing ----------------
    # Redirect all unknown paths to index.html (inherits server-level headers)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------- Logging ----------------
    access_log /var/log/nginx/access.log combined;
}

